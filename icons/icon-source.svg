<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>V60 Brew Guide Icon</title>
  <!-- Background -->
  <rect width="512" height="512" fill="#3E2723"/>
  <!--
    V60 side profile with handle, scaled to fill ~75% of icon area.
    Original viewBox: 0 0 56 52
    Scale factor: min(512*0.75/56, 512*0.75/52) = min(6.86, 7.38) = 6.86
    Rendered size: 56*6.86=384 wide, 52*6.86=357 tall
    Offset: x=(512-384)/2=64, y=(512-357)/2=77
  -->
  <g transform="translate(64, 77) scale(6.857)">
    <!-- Top rim -->
    <rect x="2" y="2" width="42" height="6" rx="3" stroke="#EFEBE9" stroke-width="2.5" fill="none"/>
    <!-- Cone body -->
    <path d="M5 8 L22 46 L24 46 L41 8 Z" stroke="#EFEBE9" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
    <!-- Spiral ribs inside cone -->
    <path d="M11 16 Q23 13.5 35 16" stroke="#EFEBE9" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.65" fill="none"/>
    <path d="M14 24 Q23 21.5 32 24" stroke="#EFEBE9" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5" fill="none"/>
    <path d="M17 32 Q23 29.5 29 32" stroke="#EFEBE9" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.35" fill="none"/>
    <!-- Handle (right side ear) -->
    <path d="M41 14 Q53 19 53 24 Q53 29 41 34" stroke="#EFEBE9" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Bottom drain hole -->
    <circle cx="23" cy="48" r="2.5" fill="#EFEBE9"/>
  </g>
</svg>
