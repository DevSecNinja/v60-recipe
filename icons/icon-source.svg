<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>V60 Brew Guide Icon</title>
  <!-- Background -->
  <rect width="512" height="512" fill="#3E2723"/>
  <!--
    V60 (3/4 view with handle), scaled to ~75% of icon area.
    Original viewBox: 0 0 60 56
    scale = min(512*0.75/60, 512*0.75/56) = min(6.4, 6.857) = 6.4
    Rendered: 60*6.4=384 wide, 56*6.4=358 tall
    Offset: x=(512-384)/2=64, y=(512-358)/2=77
  -->
  <g transform="translate(64, 77) scale(6.4)" fill="none">
    <!-- Top rim ellipse -->
    <ellipse cx="26" cy="9" rx="22" ry="4.5" stroke="#EFEBE9" stroke-width="2.2"/>
    <!-- Cone body -->
    <path d="M4 9 L26 51 L48 9" stroke="#EFEBE9" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Spiral ribs -->
    <path d="M9 10 L26 51" stroke="#EFEBE9" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M14.5 10.8 L26 51" stroke="#EFEBE9" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M20 11.3 L26 51" stroke="#EFEBE9" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M32 11.3 L26 51" stroke="#EFEBE9" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M37.5 10.8 L26 51" stroke="#EFEBE9" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
    <path d="M43 10 L26 51" stroke="#EFEBE9" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
    <!-- Side handle -->
    <path d="M48 12 Q57 16 57 22 Q57 28 48 31" stroke="#EFEBE9" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Drain hole -->
    <ellipse cx="26" cy="51.5" rx="2.2" ry="0.9" fill="#EFEBE9"/>
  </g>
</svg>
