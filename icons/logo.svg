<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 56" fill="none" aria-label="V60 Brew Guide Logo" role="img">
  <title>V60 Brew Guide</title>
  <!-- Top rim (ellipse — open mouth of the dripper, 3/4 view) -->
  <ellipse cx="26" cy="9" rx="22" ry="4.5" stroke="#3E2723" stroke-width="2.2"/>
  <!-- Cone body: from rim edges down to the point -->
  <path d="M4 9 L26 51 L48 9" stroke="#3E2723" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Spiral ribs: diagonal lines from rim down toward the cone tip -->
  <path d="M9 10 L26 51" stroke="#3E2723" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M14.5 10.8 L26 51" stroke="#3E2723" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M20 11.3 L26 51" stroke="#3E2723" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M32 11.3 L26 51" stroke="#3E2723" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M37.5 10.8 L26 51" stroke="#3E2723" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
  <path d="M43 10 L26 51" stroke="#3E2723" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- Side handle: curved grip on the right (signature V60 detail) -->
  <path d="M48 12 Q57 16 57 22 Q57 28 48 31" stroke="#3E2723" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Drain hole at the cone tip -->
  <ellipse cx="26" cy="51.5" rx="2.2" ry="0.9" fill="#3E2723"/>
</svg>
