<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 52" fill="none" aria-label="V60 Brew Guide Logo" role="img">
  <title>V60 Brew Guide</title>
  <!-- Top rim -->
  <rect x="2" y="2" width="42" height="6" rx="3" stroke="#3E2723" stroke-width="2.5"/>
  <!-- Cone body -->
  <path d="M5 8 L22 46 L24 46 L41 8 Z" stroke="#3E2723" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Spiral ribs inside cone -->
  <path d="M11 16 Q23 13.5 35 16" stroke="#3E2723" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.65"/>
  <path d="M14 24 Q23 21.5 32 24" stroke="#3E2723" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M17 32 Q23 29.5 29 32" stroke="#3E2723" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.35"/>
  <!-- Handle (right side ear) -->
  <path d="M41 14 Q53 19 53 24 Q53 29 41 34" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom drain hole -->
  <circle cx="23" cy="48" r="2.5" fill="#3E2723"/>
</svg>
