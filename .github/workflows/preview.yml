name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/**'
      - '.devcontainer/**'
      - '.vscode/**'
      - 'renovate.json5'

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy_preview:
    if: |
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'renovate[bot]' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check required secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing required Cloudflare secrets (CLOUDFLARE_API_TOKEN and/or CLOUDFLARE_ACCOUNT_ID)"
            exit 1
          fi
          echo "Required secrets are configured"

      - name: Auto-update service worker cache version
        run: |
          set -euo pipefail
          VERSION="sha-${GITHUB_SHA::7}"
          echo "Setting service worker CACHE_NAME to v60-recipe-${VERSION}"
          sed -i -E "s|const CACHE_NAME = 'v60-recipe-[^']+';|const CACHE_NAME = 'v60-recipe-${VERSION}';|" sw.js
          grep "const CACHE_NAME" sw.js

      - name: Auto-update footer commit SHA
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "Setting footer commit SHA to ${SHORT_SHA}"
          sed -i -E 's|(<span class="commit-sha" id="commitSha">)dev(</span>)|\1'"${SHORT_SHA}"'\2|' index.html
          grep 'id="commitSha"' index.html

      - name: Ensure Cloudflare Pages project exists
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: pages project create v60-recipe --production-branch main

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: >
            pages deploy .
            --project-name=v60-recipe
            --branch=${{ github.head_ref }}

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cf-preview-comment -->';
            const body = `${marker}\n🔍 **Preview deployed:** ${{ steps.deploy.outputs.deployment-url }}\n\n_Updated: ${new Date().toUTCString()}_`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  close_preview:
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'renovate[bot]' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      deployments: write

    steps:
      - name: Delete Cloudflare Pages preview deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: v60-recipe
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          # Fetch deployments for the branch
          HTTP_CODE=$(curl -s -o /tmp/cf_response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Failed to list deployments (HTTP $HTTP_CODE):"
            cat /tmp/cf_response.json
            exit 1
          fi
          RESPONSE=$(cat /tmp/cf_response.json)

          # Extract deployment IDs matching the branch
          DEPLOYMENT_IDS=$(echo "$RESPONSE" | jq -r \
            --arg branch "$BRANCH" \
            '.result[] | select(.deployment_trigger.metadata.branch == $branch) | .id')

          if [ -z "$DEPLOYMENT_IDS" ]; then
            echo "No preview deployments found for branch '$BRANCH'"
            exit 0
          fi

          # Delete each deployment
          for DEPLOYMENT_ID in $DEPLOYMENT_IDS; do
            echo "Deleting deployment $DEPLOYMENT_ID for branch '$BRANCH'"
            DEL_CODE=$(curl -s -o /tmp/cf_del_response.json -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments/$DEPLOYMENT_ID?force=true")
            if [ "$DEL_CODE" -lt 200 ] || [ "$DEL_CODE" -ge 300 ]; then
              echo "::warning::Failed to delete deployment $DEPLOYMENT_ID (HTTP $DEL_CODE):"
              cat /tmp/cf_del_response.json
            else
              echo " ✅ Deleted"
            fi
          done
